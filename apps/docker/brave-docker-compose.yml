# Must use https: and tls:no-verify
# User : kasm_user
# Add environment variables VNC_PW to set password

services:
  brave:
    image: kasmweb/brave:1.18.0
    container_name: brave
    ports:
      - "3003:6901"
    environment:
      - VNC_PW=${VNC_PW}
      - LAUNCH_URL=${LAUNCH_URL}
    shm_size: 1gb
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    volumes:
      # - /mnt/sec/apps/brave/data:/home/seluser/.config/BraveSoftware/Brave-Browser
      # - /mnt/sec/apps/brave/downloads:/home/seluser/Downloads
      - /mnt/sec/apps/brave/data:/home/kasm_user/.config/BraveSoftware/Brave-Browser
      - /mnt/sec/apps/brave/downloads:/home/kasm_user/Downloads
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
