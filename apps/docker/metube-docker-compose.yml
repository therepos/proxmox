services:
  metube:
    image: ghcr.io/therepos/metube:latest
    container_name: metube
    ports:
      - "3010:8081"
    volumes:
      - /mnt/sec/media/music:/downloads
      - /mnt/sec/apps/metube:/config
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    labels:
      - "com.centurylinklabs.watchtower.enable=true"