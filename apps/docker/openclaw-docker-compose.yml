services:
  openclaw-init:
    image: busybox
    container_name: openclaw-init
    volumes:
      - /mnt/sec/apps/openclaw/config:/home/node/.openclaw
      - /mnt/sec/apps/openclaw/workspace:/home/node/.openclaw/workspace
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /home/node/.openclaw/workspace
        if [ ! -f /home/node/.openclaw/openclaw.json ]; then
          printf '{\n  gateway: {\n    controlUi: {\n      allowedOrigins: ["https://openclaw.threeminuteslab.com"]\n    }\n  },\n  agents: {\n    defaults: {\n      model: {\n        primary: "anthropic/claude-sonnet-4-20250514"\n      }\n    }\n  },\n  models: {\n    providers: {\n      anthropic: {\n        apiKey: "$${ANTHROPIC_API_KEY}"\n      }\n    }\n  }\n}\n' > /home/node/.openclaw/openclaw.json
        fi
        chown -R 1000:1000 /home/node/.openclaw
    restart: "no"

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - /mnt/sec/apps/openclaw/config:/home/node/.openclaw
      - /mnt/sec/apps/openclaw/workspace:/home/node/.openclaw/workspace
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${GATEWAY_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    mem_limit: 2g
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
      - apparmor=unconfined
      - seccomp=unconfined