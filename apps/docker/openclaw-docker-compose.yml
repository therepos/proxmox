services:
  openclaw-init:
    image: busybox
    container_name: openclaw-init
    volumes:
      - /mnt/sec/apps/openclaw/config:/home/node/.openclaw
      - /mnt/sec/apps/openclaw/workspace:/home/node/.openclaw/workspace
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /home/node/.openclaw/workspace
        chown -R 1000:1000 /home/node/.openclaw
    restart: "no"

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - /mnt/sec/apps/openclaw/config:/home/node/.openclaw
      - /mnt/sec/apps/openclaw/workspace:/home/node/.openclaw/workspace
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    mem_limit: 2g
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
      - apparmor=unconfined
      - seccomp=unconfined