# The Firefly III Data Importer:
# 1. Generate Personal Access Token
# 2. Set FIREFLY_III_ACCESS_TOKEN in Portainer (Personal Access Token)
#
# =====
# General:
#   The Firefly III URL is: http://app:8080
#   https://docs.firefly-iii.org/how-to/firefly-iii/installation/portainer/
#
# =====
# ENV:
#   APP_KEY=<32-char-string>
#   APP_URL=https://hostname.com
#   DB_PASSWORD=<min-16-char>
#   STATIC_CRON_TOKEN=<32-char-string>
#   MAIL_USERNAME=username@email.com
#   MAIL_PASSWORD=<mail-app-password>
#   MAIL_FROM=username@email.com
#   MAIL_FROM_ADDRESS=username@email.com
#   FIREFLY_III_ACCESS_TOKEN=
#   FIREFLY_III_URL=https://hostname.com
#
# =====

services:
  app:
    image: fireflyiii/core:latest
    container_name: firefly3
    networks:
      - firefly3
    restart: always
    env_file:
      - firefly3.env
    environment:
      # Sensitive values supplied via the Portainer stack env vars
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_PASSWORD: ${DB_PASSWORD}
      STATIC_CRON_TOKEN: ${STATIC_CRON_TOKEN}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
    volumes:
      - /mnt/sec/apps/firefly3/upload:/var/www/html/storage/upload
    ports:
      - '3018:8080'
    depends_on:
      - db
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      
  db:
    image: mariadb:lts
    container_name: firefly3-db
    networks:
      - firefly3
    restart: always
    env_file:
      - firefly3.env
    environment:
      # Sensitive values supplied via the Portainer stack env vars
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /mnt/sec/apps/firefly3/db:/var/lib/mysql
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
      
  importer:
    image: fireflyiii/data-importer:latest
    container_name: firefly3-importer
    restart: always
    networks:
      - firefly3
    env_file:
      - firefly3.env
    environment:
      FIREFLY_III_ACCESS_TOKEN: ${FIREFLY_III_ACCESS_TOKEN}
      FIREFLY_III_URL: ${FIREFLY_III_URL}
    ports:
      - '3017:8080'
    depends_on:
      - app
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
      
  cron:
    #
    # To make this work, set STATIC_CRON_TOKEN in your .env file or as an environment variable
    # The STATIC_CRON_TOKEN must be *exactly* 32 characters long
    # Use this URL for inspiration: https://www.random.org/strings/?num=1&len=32&digits=on&upperalpha=on&loweralpha=on&unique=on&format=html&rnd=new
    #
    image: alpine
    container_name: firefly3-cron
    restart: always
    command: sh -c "
      apk add tzdata && \
      (ln -fs /usr/share/zoneinfo/$$TZ /etc/localtime || true) && \
      echo \"0 3 * * * wget -qO- https://firefly3.threeminuteslab.com/api/v1/cron/$$STATIC_CRON_TOKEN;echo\"
      | crontab - && \
      crond -f -L /dev/stdout"
    networks:
      - firefly3
    env_file:
      - firefly3.env
    environment:
      STATIC_CRON_TOKEN: ${STATIC_CRON_TOKEN}
    depends_on:
      - app
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
      
networks:
  firefly3:
    driver: bridge